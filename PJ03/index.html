<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>autofox · Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --page:#EDEFF1;--card:#FFFFFF;--ink:#1F2328;--muted:#566069;--faint:#97A0A8;
    --line:#EEF0F3;--line2:#E1E5EA;--accent:#E1342A;--accent-soft:#FCEAE8;
    --radius:14px;--mono:"JetBrains Mono",ui-monospace,monospace;
    --sans:"Rajdhani","Inter",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--page);color:var(--ink);line-height:1.55;letter-spacing:.005em;font-size:16.5px;-webkit-font-smoothing:antialiased;overflow:hidden}
  a{color:inherit;text-decoration:none}

  .wrap{height:100vh;max-width:1160px;margin:0 auto;padding:24px 28px;display:grid;grid-template-columns:minmax(0,1fr) 210px;gap:32px;align-items:stretch}

  /* ---------- Viewer = scroll-snap container ---------- */
  .viewer{
    height:100%;overflow-y:auto;overflow-x:hidden;
    scroll-snap-type:y mandatory;overscroll-behavior:contain;
    background:var(--card);border:1px solid var(--line2);border-radius:var(--radius);
    box-shadow:0 1px 2px rgba(20,30,45,.04);scrollbar-width:thin;
  }
  .viewer::-webkit-scrollbar{width:8px}
  .viewer::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}

  .panel{
    min-height:100%;scroll-snap-align:start;scroll-snap-stop:always;
    display:flex;flex-direction:column;justify-content:center;
    padding:54px 56px;position:relative;
  }
  .panel-inner{width:100%;max-width:720px;margin:0 auto}
  .panel-kicker{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--accent);margin-bottom:12px}
  .panel-title{font-size:30px;font-weight:700;letter-spacing:.005em;line-height:1.12;margin-bottom:20px}

  /* content typography */
  .panel p{margin-bottom:15px;color:#333b44}
  .panel ul,.panel ol{margin:0 0 16px 22px}
  .panel li{margin-bottom:6px;color:#333b44}
  .panel li::marker{color:var(--faint)}
  code{font-family:var(--mono);font-size:.82em;background:var(--line);padding:2px 6px;border-radius:4px;color:#374151;letter-spacing:0}
  mark{background:#FFE9A8;padding:0 3px;border-radius:2px}
  a.ext{color:var(--accent);font-weight:500;border-bottom:1px solid var(--accent-soft);transition:border-color .12s}
  a.ext:hover{border-color:var(--accent)}

  .callout{border-left:3px solid var(--line2);background:#F7F8FA;padding:13px 16px;border-radius:0 8px 8px 0;margin:6px 0 16px;font-size:15px;color:var(--muted)}
  .callout.warn{border-color:var(--accent);background:var(--accent-soft);color:#9a2218}
  .callout b{color:inherit;font-weight:600}

  .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:6px 0 16px}
  .card{border:1px solid var(--line2);border-radius:10px;padding:15px 16px}
  .card h4{font-size:15px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:8px}
  .card .pill{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:20px;background:#EEF0F3;color:var(--muted)}
  .card .pill.adv{background:var(--accent-soft);color:var(--accent)}
  .card p{font-size:14px;color:var(--muted);margin:0}

  .tree{font-family:var(--mono);font-size:12.5px;background:#F7F8FA;border:1px solid var(--line2);border-radius:8px;padding:15px 16px;margin:6px 0 16px;color:#374151;line-height:1.95;white-space:pre;letter-spacing:0}
  .figure{margin:18px 0 4px;border:1px solid var(--line2);border-radius:10px;background:#E7EAEE;aspect-ratio:16/9;width:100%;max-height:38vh;display:flex;align-items:center;justify-content:center;color:var(--faint);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
  .todo{border:1px dashed var(--line2);border-radius:8px;padding:12px 15px;color:var(--faint);font-size:14.5px;margin:6px 0 4px}

  .redirect{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--accent);color:var(--accent);border-radius:8px;padding:9px 18px;font-family:var(--sans);font-size:16px;font-weight:600;letter-spacing:.01em;cursor:pointer;transition:background .12s,color .12s}
  .redirect:hover{background:var(--accent);color:#fff}

  .cform{display:flex;flex-direction:column;gap:9px;max-width:460px;margin:8px 0 4px}
  .cform label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .cform input,.cform textarea{font-family:var(--sans);font-size:15.5px;padding:9px 12px;border:1px solid var(--line2);border-radius:8px;background:#fff;color:var(--ink);outline:none;transition:border-color .12s,box-shadow .12s}
  .cform input:focus,.cform textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .cform textarea{min-height:84px;resize:vertical}
  .cbtn{align-self:flex-start;margin-top:4px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 22px;font-family:var(--sans);font-size:15.5px;font-weight:600;letter-spacing:.01em;cursor:pointer;transition:filter .12s}
  .cbtn:hover{filter:brightness(1.06)}
  .cform-card{background:var(--accent-soft);border:1px solid #F2C9C5;border-left:3px solid var(--accent);border-radius:12px;padding:18px 20px 20px;margin:8px 0 4px}
  .cform-card>p:first-child{margin-top:0}
  .providers{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 6px}
  .providers span{font-size:13.5px;background:#fff;border:1px solid var(--line2);border-radius:20px;padding:5px 13px;color:#333b44}
  .dim{color:var(--faint);font-size:14px}

  /* intro panel header */
  .intro-head{border-bottom:2px solid var(--ink);padding-bottom:20px;margin-bottom:22px}
  .doc-title{font-size:30px;font-weight:700;text-transform:uppercase;letter-spacing:.015em;line-height:1.1;margin-bottom:16px}
  .dl-sub{font-family:var(--mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.16em;color:var(--faint)}
  .dl-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .dl-col{display:flex;flex-direction:column;align-items:center;gap:11px;text-align:center;border:1px solid var(--line2);border-radius:12px;padding:20px 18px;background:#FbFcFd}
  .badge{display:inline-block;width:172px;border-radius:8px;transition:transform .12s}
  .badge:hover{transform:translateY(-1px)}
  .store-badge{display:block;width:100%;height:auto}
  .dl-url{font-family:var(--mono);font-size:11.5px;color:var(--accent);word-break:break-all;border-bottom:1px solid var(--accent-soft)}
  .dl-url:hover{border-color:var(--accent)}
  .qr{width:120px;height:120px;background:#fff;border:1px solid var(--line2);border-radius:10px;padding:8px;display:flex;align-items:center;justify-content:center}
  .qr img,.qr canvas{display:block;width:104px;height:104px}
  .qr-label{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint)}

  /* next-section affordance */
  .panel-next{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:36px;height:36px;border-radius:50%;border:1px solid var(--line2);background:#fff;color:var(--muted);display:grid;place-items:center;cursor:pointer;transition:color .12s,border-color .12s}
  .panel-next:hover{color:var(--accent);border-color:var(--accent)}
  .panel-next svg{width:18px;height:18px}
  #doc .panel:last-child .panel-next{display:none}

  /* progress pill */
  .progress{position:fixed;top:14px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--muted);background:rgba(255,255,255,.82);backdrop-filter:blur(6px);padding:5px 13px;border-radius:20px;border:1px solid var(--line2);z-index:30;pointer-events:none}

  /* ---------- Rail ---------- */
  .rail{height:100%;overflow-y:auto;padding:6px 4px 0 0;scrollbar-width:thin}
  .rail-group{margin-bottom:16px}
  .rail-group .grp{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);margin-bottom:5px}
  .rail-item{display:flex;align-items:stretch;gap:4px}
  .rail-link{flex:1;min-width:0;display:block;font-size:14px;color:var(--muted);padding:5px 0 5px 12px;border-left:2px solid var(--line2);cursor:pointer;transition:color .12s,border-color .12s}
  .rail-link:hover{color:var(--ink)}
  .rail-link.active{color:var(--accent);border-color:var(--accent);font-weight:600}
  .rail-copy{flex:none;border:none;background:none;padding:2px;margin:2px 0;display:grid;place-items:center;color:var(--faint);cursor:pointer;opacity:.5;border-radius:5px;transition:opacity .12s,color .12s,background .12s}
  .rail-copy:hover{opacity:1;color:var(--accent);background:var(--accent-soft)}
  .rail-copy svg{width:13px;height:13px;display:block}

  /* toast */
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#fff;font-size:13px;letter-spacing:.01em;padding:9px 16px;border-radius:9px;box-shadow:0 6px 20px rgba(20,30,45,.22);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:60;max-width:80vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:760px){
    .wrap{grid-template-columns:1fr;gap:0;padding:0}
    .rail{display:none}
    .viewer{border-radius:0;border:none}
    .panel{padding:64px 22px 56px}
    .doc-title,.panel-title{font-size:23px}
    .cards,.dl-grid{grid-template-columns:1fr}
  }
  @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

    <section class="panel" id="__intro" data-chapter="__intro">
      <div class="panel-inner">

          <div class="doc-title">Step by step guide for the set up of the autofox app</div>

              <svg class="store-badge" viewBox="0 0 135 40" xmlns="http://www.w3.org/2000/svg" role="img">
                <rect x=".5" y=".5" width="134" height="39" rx="6.5" fill="#000" stroke="#A6A6A6"/>

                  <polygon points="4,3.5 4,12 10.5,12" fill="#00C3FF"/>
                  <polygon points="4,12 4,20.5 10.5,12" fill="#FF424B"/>

                <text x="40" y="15" fill="#fff" font-family="Roboto,Arial,sans-serif" font-size="6.4" letter-spacing="1">GET IT ON</text>
                <text x="39.5" y="31" fill="#fff" font-family="Roboto,Arial,sans-serif" font-size="15" font-weight="500">Google Play</text>
              </svg>
            </a>
            <a class="dl-url" href="https://play.google.com/store/apps/details?id=com.autofox.ai&hl=de_CH" target="_blank" rel="noopener">play.google.com/store/apps/details?id=com.autofox.ai</a>
            <div class="qr" id="qr-android"></div>
            <div class="qr-label">Scan for Android</div>

      </div>
      <button class="panel-next" aria-label="Weiter"></button>
    </section>
    <div id="doc"></div>
  </main>
  <aside class="rail"><div id="rail"></div></aside>
</div>

<div class="progress" id="progress"></div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
/* =================================================================
   CONTENT  ·  chapter { id, group, title, steps, lead, sections }
   section { id, title, html, noFig? }
   ================================================================= */
const CHAPTERS = [
  /* ---------- Getting Started ---------- */
  {
    id:"login", group:"Getting Started", title:"Wie melde ich mich an",
    sections:[
      { id:"login-app", title:"App", html:`
        <p>Öffnen Sie die App und geben Sie unter <b>Account Settings → Enter Token</b> den Token ein, den Sie per E-Mail erhalten haben. Tippen Sie anschliessend auf <b>Login</b>.</p>
        <div class="callout">Der Token gilt für mehrere Benutzer Ihrer Organisation und kann entsprechend geteilt werden.</div>
        <p>Probleme beim Zugriff? Schreiben Sie an <a class="ext" href="mailto:hello@autofox.ai">hello@autofox.ai</a>.</p>`},
      { id:"login-crm", title:"CRM", html:`
        <p>Öffnen Sie <a class="ext" href="https://crm.autofox.ai" target="_blank" rel="noopener">crm.autofox.ai</a> und melden Sie sich mit dem Token aus Ihrer E-Mail an. Dort laden Sie Bilder herunter und veröffentlichen sie auf Online-Plattformen.</p>`}
    ]
  },

  /* ---------- App ---------- */
  {
    id:"app-ui", group:"App", title:"User Interface",
    sections:[
      { id:"app-ui-overview", title:"Übersicht", html:`
        <p>Inhalt folgt.</p>
        <div class="todo">Erklärung der App-Oberfläche: Toolbar (Bilder, Inserate, Einstellungen), Guthaben-Anzeige, Fahrzeugliste und Aufnahme-Ansicht.</div>`}
    ]
  },
  {
    id:"app-photo", group:"App", title:"Wie fotografiere ich",
    sections:[
      { id:"app-capture", title:"Fahrzeug erfassen", html:`
        <p>Tippen Sie unten auf den roten <b>+</b>-Button. Scannen Sie dann die <b>VIN</b> oder geben Sie Marke, Modell und interne Bestandsnummer manuell ein.</p>`},
      { id:"app-shoot", title:"Fotos aufnehmen", html:`
        <p>Halten Sie das Smartphone gerade und richten Sie jede Aufnahme mit der visuellen Navigation aus. Sobald die Meldung erscheint, dass alles perfekt ausgerichtet ist, speichern Sie das Foto.</p>
        <p>Nach <b>5–20 Sekunden</b> stellt die KI das Fahrzeug automatisch frei. Wiederholen Sie dies, bis alle vorgegebenen Perspektiven aufgenommen sind.</p>
        <div class="callout">Passt eine Perspektive nicht, können Sie sie einfach erneut aufnehmen.</div>`},
      { id:"app-force", title:"Force-Fotografie", html:`
        <p>Halten Sie den Auslöser <b>3–4 Sekunden</b> gedrückt, um auch aus einem ungewöhnlichen Winkel ein Foto aufzunehmen — so machen Sie Bilder ausserhalb der geführten Perspektiven.</p>`},
      { id:"app-bg", title:"Hintergrund neu zuschneiden", html:`
        <p>Sie können den Hintergrund jederzeit neu freistellen oder ändern:</p>
        <ol><li><b>Home</b> → Fahrzeugfoto antippen</li><li><b>Drei-Punkte-Menü</b> (oben rechts) → <b>Cut Again</b></li><li>Hintergrund wählen → <b>Next</b> → <b>Done</b></li></ol>`},
      { id:"app-tips", title:"Tipps für gute Bilder", html:`
        <ol><li><b>Gutes Licht</b> ist das A und O guter Fahrzeugbilder.</li><li>Ist ein Ergebnis nicht zufriedenstellend, nehmen Sie die Ansicht einfach neu auf.</li><li>Halten Sie das Telefon auf Höhe der <b>Fensterlinie</b> des Fahrzeugs.</li></ol>
        <div class="callout">Kamera waagrecht zur Fensterlinie halten. Beide Wasserwaagen-Blasen müssen vor der Aufnahme zentriert sein — vertikal wie horizontal. Bei Halb- oder Dreiviertelansicht sollten immer drei Räder sichtbar sein.</div>`}
    ]
  },
  {
    id:"app-photoorder", group:"App", title:"Fotoreihenfolge anpassen",
    sections:[
      { id:"app-photoorder-guide", title:"Fotoguide", html:`
        <p>Inhalt folgt.</p>
        <div class="todo">Fotoguide für die App: in welcher Reihenfolge die Perspektiven aufgenommen werden und wie sich die Reihenfolge nachträglich ändern lässt.</div>`}
    ]
  },
  {
    id:"im", group:"App", title:"Inserate Manager",
    sections:[
      { id:"im-config", title:"Online-Plattformen einrichten", html:`
        <div class="callout">Zum Inserieren wird der Inserate Manager nicht zwingend benötigt — Ihre Bilder können Sie auch direkt auf <a class="ext" href="https://crm.autofox.ai" target="_blank" rel="noopener">crm.autofox.ai</a> herunterladen.</div>
        <p>Öffnen Sie <b>Einstellungen → Online-Plattformen</b>. Hier verwalten Sie alle Verbindungen (sofern ein Insertions-Vertrag besteht).</p>
        <p><b>Datenexport zu:</b> Gesamtübersicht aller verfügbaren Plattformen. Sie wählen genau eine als Standard — jederzeit anpassbar.</p>`},
      { id:"im-credentials", title:"Zugangsdaten & Schnittstellen", html:`
        <p><b>autolina.ch</b> hat eine direkte Schnittstelle zur Datenbank — Sie geben nur die Zugangsdaten ein. <b>carcloud.ch</b> verbindet autofox mit <b>AutoScout24</b> und <b>CarforYou</b>.</p>
        <div class="callout warn"><b>Wichtig:</b> Erst wenn die Schnittstelle aktiviert ist, können Daten über carcloud.ch an die Online-Börse geliefert werden.</div>
        <p><b>Autoscout:</b> E-Mail an <a class="ext" href="mailto:info@autoscout24.ch">info@autoscout24.ch</a> mit vollständigen Angaben (Garagen-Name, Auto-i-dat-Nummer). <b>Car4You:</b> Support telefonisch kontaktieren und Auto-i-Nummer mitteilen.</p>`},
      { id:"im-carcloud", title:"CarCloud einrichten", html:`
        <p>Registrieren unter <a class="ext" href="https://www.carcloud.ch/Account/Register" target="_blank" rel="noopener">carcloud.ch/Account/Register</a>:</p>
        <ol><li>Formular ausfüllen und auf <b>Registrieren</b> klicken.</li><li>Weiterleitung zu <b>Konto verwalten</b>.</li><li>Restliche Felder ausfüllen und einreichen.</li><li>Auf <b>Fahrzeugplattformen</b> klicken.</li><li>Login-Daten aller Plattformen hinterlegen.</li></ol>
        <p>Als neuer Benutzer erhalten Sie eine sechsstellige <b>Benutzer-Nr.</b>; die <b>auto-i Kunden-Nr.</b> tragen Sie im zweiten Feld ein. Danach die Login-Daten in der App eingeben — fertig.</p>`},
      { id:"im-start", title:"Überblick & Start", html:`
        <p>Der Inserate Manager unterstützt das Inserieren auf verschiedenen Plattformen — direkt aus der App. Sie finden ihn im Hauptmenü in der Toolbar zwischen <b>Bilder</b> und <b>Einstellungen</b>.</p>`},
      { id:"im-list", title:"Meine Inserate", html:`
        <p>Beim ersten Öffnen ist die Liste leer. Die wichtigsten Infos je Inserat:</p>
        <ul><li><b>Online-Status</b> — zeigt, ob das Inserat aktiv ist.</li><li><b>Bearbeiten</b> — führt erneut durch den Manager.</li><li><b>Fotos</b> — zugewiesene Fotos ansehen/ändern.</li><li><b>+</b> — neues Inserat erstellen.</li></ul>`},
      { id:"im-create", title:"Inserat erstellen", html:`
        <p>Sie erfassen ein Fahrzeug auf drei Arten: <b>Fahrzeugausweis</b> (fotografieren/hochladen), <b>Typengenehmigung / Marke &amp; Modell</b> oder <b>Fahrgestellnummer (VIN)</b>.</p>
        <div class="callout warn"><b>Vollständig manuelles Inserieren:</b> [IN ARBEIT – Release geplant für Oktober 2022].</div>
        <p><b>VIN-Abfrage</b> nur für: Abarth, Alfa Romeo, Audi, BMW, Cadillac, Chevrolet, Citroën, Dacia, Fiat, Ford, Lancia, Mercedes-Benz, Mini, Nissan, Opel, Peugeot, Porsche, Seat, Skoda, Smart, Volkswagen, Volvo.</p>

/* =================================================================
   RENDER  ·  one panel per section
   ================================================================= */
const viewer=document.getElementById("viewer");
const docEl=document.getElementById("doc");
const railEl=document.getElementById("rail");
const progressEl=document.getElementById("progress");
const toast=document.getElementById("toast");

const CHEVRON=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>`;
const LINK_ICON=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`;

let docHtml="";
CHAPTERS.forEach(c=>{
  c.sections.forEach(s=>{
    const fig = s.noFig ? "" : `<div class="figure">Grafik</div>`;
    docHtml+=`<section class="panel" id="${s.id}" data-chapter="${c.id}">
      <div class="panel-inner">
        <div class="panel-kicker">${c.group} · ${c.title}</div>
        <h2 class="panel-title">${s.title}</h2>
        ${s.html}${fig}
      </div>
      <button class="panel-next" aria-label="Weiter">${CHEVRON}</button>
    </section>`;
  });
});
docEl.innerHTML=docHtml;
/* chevron icon for the intro panel's next button */
document.querySelector("#__intro .panel-next").innerHTML=CHEVRON;

/* floating rail (chapters) */
let railHtml="", lastGroup=null;
CHAPTERS.forEach(c=>{
  if(c.group!==lastGroup){
    if(lastGroup!==null) railHtml+=`</div>`;
    railHtml+=`<div class="rail-group"><div class="grp">${c.group}</div>`;
    lastGroup=c.group;
  }
  railHtml+=`<div class="rail-item"><a class="rail-link" data-target="${c.id}">${c.title}</a><button class="rail-copy" data-target="${c.id}" title="Link kopieren & hierhin springen" aria-label="Link kopieren">${LINK_ICON}</button></div>`;
});
railHtml+=`</div>`;
railEl.innerHTML=railHtml;

/* =================================================================
   NAVIGATION
   ================================================================= */
const panels=[...viewer.querySelectorAll(".panel")];
const total=panels.length;
const links=[...railEl.querySelectorAll(".rail-link")];
let current=0, toastTimer=null;

function updateProgress(){ progressEl.textContent=String(current+1).padStart(2,"0")+" / "+String(total).padStart(2,"0"); }
function setActiveChapter(chId){ links.forEach(l=>l.classList.toggle("active",l.dataset.target===chId)); }
function scrollToPanel(i){ if(i<0||i>=total) return; panels[i].scrollIntoView({behavior:"smooth",block:"start"}); }
function panelById(id){ return panels.find(p=>p.id===id); }
function firstPanelOfChapter(chId){ return panels.find(p=>p.dataset.chapter===chId); }

window.goToChapter=function(chId){ const p=firstPanelOfChapter(chId); if(p) p.scrollIntoView({behavior:"smooth",block:"start"}); };

/* rail interactions */
links.forEach(l=>l.addEventListener("click",()=>goToChapter(l.dataset.target)));
railEl.querySelectorAll(".rail-copy").forEach(b=>b.addEventListener("click",e=>{ e.stopPropagation(); const id=b.dataset.target; goToChapter(id); copyLink(id); }));

/* next-section chevrons */
panels.forEach((p,i)=>{ const btn=p.querySelector(".panel-next"); if(btn) btn.addEventListener("click",()=>scrollToPanel(i+1)); });

/* keyboard nav (ignore while typing) */
document.addEventListener("keydown",e=>{
  const tag=(e.target.tagName||"").toLowerCase();
  if(tag==="input"||tag==="textarea") return;
  if(e.key==="ArrowDown"||e.key==="PageDown"){ e.preventDefault(); scrollToPanel(current+1); }
  else if(e.key==="ArrowUp"||e.key==="PageUp"){ e.preventDefault(); scrollToPanel(current-1); }
});

/* observe which panel is centred */
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting){
    current=panels.indexOf(e.target);
    updateProgress();
    setActiveChapter(e.target.dataset.chapter);
  }});
},{root:viewer,rootMargin:"-45% 0px -45% 0px",threshold:0});
panels.forEach(p=>io.observe(p));
updateProgress();

/* deep-link: shared section/chapter URL */
function handleHash(){
  const raw=(location.hash||"").replace("#",""); if(!raw) return;
  let p=panelById(raw)||firstPanelOfChapter(raw);
  if(p) setTimeout(()=>p.scrollIntoView({block:"start"}),60);
}
window.addEventListener("hashchange",handleHash);
setTimeout(handleHash,200);

/* copy deep link */
function showToast(msg){ toast.textContent=msg; toast.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove("show"),1700); }
async function copyLink(id){
  const url=location.href.split("#")[0]+"#"+id;
  try{ history.replaceState(null,"","#"+id); }catch(e){}
  let ok=false;
  try{ await navigator.clipboard.writeText(url); ok=true; }
  catch(e){ try{ const t=document.createElement("textarea"); t.value=url; t.style.position="fixed"; t.style.opacity="0"; document.body.appendChild(t); t.select(); ok=document.execCommand("copy"); document.body.removeChild(t); }catch(_){} }
  showToast(ok?"Link kopiert":url);
}

/* contact form → prefilled email */
function afContact(){
  const v=id=>(document.getElementById(id)&&document.getElementById(id).value||"").trim();
  const name=v("af-name"), firma=v("af-company"), email=v("af-email"), msg=v("af-msg");
  const subject="API-Anbindung – Anfrage"+(firma?(" ("+firma+")"):"");
  const body=`Name: ${name}\nFirma: ${firma}\nE-Mail: ${email}\n\n${msg}`;
  window.location.href="mailto:hello@autofox.ai?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);
}

/* QR codes */
function makeQR(id,url){ const el=document.getElementById(id); if(!el||typeof QRCode==="undefined") return; new QRCode(el,{text:url,width:104,height:104,colorDark:"#1F2328",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M}); }
makeQR("qr-ios","https://apps.apple.com/ch/app/autofox-ai/id1563750787");
makeQR("qr-android","https://play.google.com/store/apps/details?id=com.autofox.ai&hl=de_CH");
</script>
